<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" ry="112" fill="#ff6f0f"/>
  <!-- "m" 문자를 path로 직접 그림 — 폰트 의존성 0 -->
  <!-- 3개의 세로 막대 + 둥근 윗머리. 카카오/토스 풍 굵은 산세리프 -->
  <g fill="white" transform="translate(82 110)">
    <!-- 왼쪽 막대 -->
    <rect x="0" y="80" width="68" height="212" rx="4"/>
    <!-- 중앙 막대 -->
    <rect x="140" y="80" width="68" height="212" rx="4"/>
    <!-- 오른쪽 막대 -->
    <rect x="280" y="80" width="68" height="212" rx="4"/>
    <!-- 왼쪽 아치 -->
    <path d="M 0 100 Q 0 0 104 0 Q 174 0 174 60 L 174 100 L 140 100 L 140 80 Q 140 50 104 50 Q 68 50 68 100 Z"/>
    <!-- 오른쪽 아치 -->
    <path d="M 140 100 Q 140 0 244 0 Q 348 0 348 100 L 348 100 L 280 100 L 280 80 Q 280 50 244 50 Q 208 50 208 100 Z"/>
  </g>
</svg>
